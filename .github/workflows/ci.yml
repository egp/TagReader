# .github/workflows/ci.yml v2
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  compile-examples:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fqbn:
          - arduino:avr:uno
          - arduino:renesas_uno:minima
          - arduino:renesas_uno:unor4wifi

    steps:
      - name: Check out TCP0532
        uses: actions/checkout@v4
        with:
          path: TCP0532

      - name: Check out TCP1819
        uses: actions/checkout@v4
        with:
          repository: egp/TCP1819
          path: TCP1819

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$PWD/bin" >> "$GITHUB_PATH"

      - name: Update core index
        run: arduino-cli core update-index

      - name: Install AVR core
        run: arduino-cli core install arduino:avr

      - name: Install Renesas UNO core
        run: arduino-cli core install arduino:renesas_uno

      - name: Compile ReaderAlive
        working-directory: TCP0532
        run: |
          arduino-cli compile \
            --fqbn "${{ matrix.fqbn }}" \
            --library . \
            --library ../TCP1819 \
            examples/ReaderAlive

  host-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out TCP0532
        uses: actions/checkout@v4
        with:
          path: TCP0532

      - name: Run host tests
        working-directory: TCP0532
        run: |
          make clean test
# .github/workflows/ci.yml v2